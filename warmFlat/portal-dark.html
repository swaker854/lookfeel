<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<title>Dashboard Portal — Dark</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; }

  :root {
    --bg:           #151825;
    --bg-surface:   #222840;
    --bg-surface-2: #252B3E;
    --border:       rgba(255,255,255,0.12);
    --border-cyan:  rgba(0,242,255,0.22);
    --rim-cyan:     rgba(0,242,255,0.08);
    --text-primary: #EEF2F7;
    --text-sec:     #8A99B0;
    --text-muted:   #7A8EA8;
    --text-dim:     #3E4E62;
    --accent:       #00F2FF;
    --accent-dim:   rgba(0,242,255,0.35);
    --active-bg:    rgba(0,242,255,0.08);
    --hover-bg:     rgba(255,255,255,0.04);
  }

  .portal { width:100%; height:100vh; display:flex; flex-direction:column; background:var(--bg); color:var(--text-sec); }

  .topnav {
    display:flex; align-items:center; height:44px; padding:0 12px;
    flex-shrink:0; gap:4px; background:var(--bg-surface-2);
    border-bottom:1px solid var(--border);
    box-shadow:inset 0 1px 0 var(--rim-cyan); position:relative;
  }
  .topnav::after {
    content:''; position:absolute; top:0; left:80px; right:80px; height:1px;
    background:linear-gradient(90deg, transparent 0%, rgba(0,242,255,0.38) 20%, rgba(0,242,255,0.55) 50%, rgba(0,242,255,0.38) 80%, transparent 100%);
    pointer-events:none;
  }
  .nav-logo { width:28px; height:28px; display:flex; align-items:center; justify-content:center; margin-right:4px; flex-shrink:0; }
  .nav-logo svg { width:20px; height:20px; }
  .nav-btn { width:30px; height:30px; display:flex; align-items:center; justify-content:center; border-radius:6px; cursor:pointer; flex-shrink:0; transition:background 0.15s; }
  .nav-btn:hover { background:var(--hover-bg); }
  .nav-btn svg { width:14px; height:14px; }
  .nav-btn.active { background:var(--active-bg); border:0.5px solid var(--border-cyan); box-shadow:inset 0 1px 0 rgba(0,242,255,0.12); }
  .nav-btn.active svg { opacity:0.9; filter:drop-shadow(0 0 3px rgba(0,242,255,0.5)); }
  .nav-spacer { flex:1; }
  .nav-right { display:flex; align-items:center; gap:4px; }
  .nav-right-btn { width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:background 0.15s; }
  .nav-right-btn:hover { background:var(--hover-bg); }
  .nav-right-btn svg { width:13px; height:13px; }
  .nav-avatar { width:26px; height:26px; border-radius:50%; background:var(--bg-surface-2); border:0.5px solid var(--border-cyan); display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .nav-avatar svg { width:14px; height:14px; fill:var(--text-sec); }

  .breadcrumb-bar { display:flex; align-items:center; gap:6px; padding:0 12px; height:32px; flex-shrink:0; background:var(--bg-surface); border-bottom:1px solid var(--border); }
  .breadcrumb-label { font-size:11px; font-weight:500; color:var(--text-sec); }
  .breadcrumb-sep { color:var(--text-dim); font-size:11px; }
  .breadcrumb-spacer { flex:1; }
  .breadcrumb-action { width:22px; height:22px; border-radius:4px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:background 0.15s; }
  .breadcrumb-action:hover { background:var(--hover-bg); }
  .breadcrumb-action svg { width:12px; height:12px; }

  .body { display:flex; flex:1; overflow:hidden; min-height:0; }

  .left-panel { width:220px; flex-shrink:0; background:var(--bg-surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
  .panel-search-row { display:flex; align-items:center; gap:6px; padding:8px 10px; border-bottom:1px solid var(--border); }
  .panel-search { flex:1; font-size:11px; font-family:inherit; padding:4px 8px; border-radius:5px; border:0.5px solid var(--border); background:rgba(255,255,255,0.05); color:var(--text-sec); outline:none; min-width:0; }
  .panel-search::placeholder { color:var(--text-muted); }
  .panel-search:focus { border-color:var(--border-cyan); }
  .panel-icon-btn { width:24px; height:24px; border-radius:5px; flex-shrink:0; display:flex; align-items:center; justify-content:center; background:var(--bg-surface); border:0.5px solid var(--border); cursor:pointer; transition:background 0.15s; }
  .panel-icon-btn:hover { background:var(--hover-bg); }
  .panel-icon-btn svg { width:11px; height:11px; }

  .tree { flex:1; overflow-y:auto; padding:4px 0; }
  .tree::-webkit-scrollbar { width:3px; }
  .tree::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  .tree-section { display:flex; align-items:center; gap:5px; padding:3px 10px; font-size:11px; color:var(--text-muted); cursor:pointer; transition:background 0.12s; }
  .tree-section:hover { background:var(--hover-bg); color:var(--text-sec); }
  .tree-chevron { font-size:8px; color:var(--text-dim); flex-shrink:0; }
  .tree-section svg { width:12px; height:12px; flex-shrink:0; opacity:0.5; }
  .tree-item { display:flex; align-items:center; gap:6px; padding:3px 10px 3px 24px; font-size:11px; color:var(--text-muted); cursor:pointer; transition:background 0.12s; position:relative; }
  .tree-item:hover { background:var(--hover-bg); color:var(--text-sec); }
  .tree-item svg { width:10px; height:10px; flex-shrink:0; opacity:0.4; }
  .tree-item.active { background:var(--active-bg); color:var(--text-primary); font-weight:500; }
  .tree-item.active::before { content:''; position:absolute; left:0; top:0; bottom:0; width:2px; background:var(--accent); box-shadow:0 0 6px var(--accent-dim); }
  .tree-item.active svg { opacity:0.9; filter:drop-shadow(0 0 2px rgba(0,242,255,0.4)); }

  .content { flex:1; overflow:hidden; padding:10px; display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; gap:10px; min-height:0; background:var(--bg); }
  .chart-card { position:relative; min-height:0; min-width:0; border-radius:18px; }
  .chart-frame { position:absolute; inset:0; width:100%; height:100%; border:none; outline:none; background:transparent; border-radius:18px; display:block; }
</style>
</head>
<body>
<div class="portal">
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <linearGradient id="accentGrad" x1="0" y1="0" x2="0.5" y2="1">
        <stop offset="0%" stop-color="#80F9FF"/><stop offset="100%" stop-color="#00C4DA"/>
      </linearGradient>
      <linearGradient id="emeraldGrad" x1="0" y1="0" x2="0.5" y2="1">
        <stop offset="0%" stop-color="#6EF5C8"/><stop offset="100%" stop-color="#0EA572"/>
      </linearGradient>
    </defs>
  </svg>

  <!-- Top Nav -->
  <div class="topnav">
    <div class="nav-logo">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M12 2C12 2 7 7 7 12.5C7 15.5 9.5 18 12 18C14.5 18 17 15.5 17 12.5C17 10 15.5 8 14 7C14.5 9 13.5 10.5 12 11C10.5 11 9.5 9.5 10 8C8.5 9.5 8 11 8 12.5C8 15 9.8 17 12 17C14.2 17 16 15 16 12.5C16 10.5 14.5 8.5 12 2Z" fill="url(#accentGrad)" style="filter:drop-shadow(0 0 4px rgba(0,242,255,0.4))"/>
      </svg>
    </div>
    <div class="nav-btn active"><svg viewBox="0 0 16 16" fill="none"><path d="M8 2L2 7v7h4v-4h4v4h4V7L8 2z" fill="url(#accentGrad)"/></svg></div>
    <div class="nav-btn"><svg viewBox="0 0 16 16"><rect x="1" y="1" width="4" height="3" rx="0.5" fill="rgba(255,255,255,0.28)"/><rect x="1" y="6" width="4" height="3" rx="0.5" fill="rgba(255,255,255,0.28)"/><rect x="1" y="11" width="4" height="3" rx="0.5" fill="rgba(255,255,255,0.28)"/><rect x="7" y="1" width="4" height="3" rx="0.5" fill="rgba(255,255,255,0.28)"/></svg></div>
    <div class="nav-btn"><svg viewBox="0 0 16 16"><rect x="3" y="1" width="10" height="14" rx="1.5" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="1"/></svg></div>
    <div class="nav-spacer"></div>
    <div class="nav-right">
      <div class="nav-right-btn"><svg viewBox="0 0 16 16"><circle cx="7" cy="7" r="4" fill="none" stroke="rgba(255,255,255,0.32)" stroke-width="1.3"/><line x1="10.5" y1="10.5" x2="14" y2="14" stroke="rgba(255,255,255,0.32)" stroke-width="1.3" stroke-linecap="round"/></svg></div>
      <div class="nav-right-btn"><svg viewBox="0 0 16 16"><rect x="2" y="3" width="12" height="9" rx="1.5" fill="none" stroke="rgba(255,255,255,0.32)" stroke-width="1.3"/><path d="M5 12v2M11 12v2" stroke="rgba(255,255,255,0.32)" stroke-width="1.3" stroke-linecap="round"/></svg></div>
      <div class="nav-right-btn"><svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6" fill="none" stroke="rgba(255,255,255,0.32)" stroke-width="1.3"/><line x1="8" y1="7" x2="8" y2="11" stroke="rgba(255,255,255,0.32)" stroke-width="1.3" stroke-linecap="round"/><circle cx="8" cy="5.2" r="0.8" fill="rgba(255,255,255,0.32)"/></svg></div>
      <div class="nav-avatar"><svg viewBox="0 0 16 16"><circle cx="8" cy="6" r="3" fill="rgba(255,255,255,0.5)"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.3"/></svg></div>
    </div>
  </div>

  <!-- Breadcrumb -->
  <div class="breadcrumb-bar">
    <svg viewBox="0 0 12 12" width="12" height="12" style="flex-shrink:0"><rect x="0.5" y="0.5" width="4.5" height="4.5" rx="0.5" fill="url(#accentGrad)" opacity="0.8"/><rect x="7" y="0.5" width="4.5" height="4.5" rx="0.5" fill="url(#accentGrad)" opacity="0.8"/><rect x="0.5" y="7" width="4.5" height="4.5" rx="0.5" fill="url(#accentGrad)" opacity="0.8"/><rect x="7" y="7" width="4.5" height="4.5" rx="0.5" fill="url(#accentGrad)" opacity="0.8"/></svg>
    <span class="breadcrumb-label" style="color:var(--text-muted)">Repository</span>
    <span class="breadcrumb-sep">/</span>
    <span class="breadcrumb-label">Revenue Dashboard</span>
    <div class="breadcrumb-spacer"></div>
    <div class="breadcrumb-action"><svg viewBox="0 0 14 16"><path d="M2 1h10a1 1 0 011 1v13l-6-4-6 4V2a1 1 0 011-1z" fill="none" stroke="rgba(0,242,255,0.5)" stroke-width="1.5" stroke-linejoin="round"/></svg></div>
  </div>

  <!-- Body -->
  <div class="body">
    <div class="left-panel">
      <div class="panel-search-row">
        <input class="panel-search" placeholder="Search"/>
        <div class="panel-icon-btn"><svg viewBox="0 0 12 12"><circle cx="5" cy="5" r="3.5" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.2"/><line x1="7.8" y1="7.8" x2="10.5" y2="10.5" stroke="rgba(255,255,255,0.35)" stroke-width="1.2" stroke-linecap="round"/></svg></div>
        <div class="panel-icon-btn"><svg viewBox="0 0 12 12"><path d="M6 1l1.2 3.6H11L8.2 6.9l1 3.6L6 8.4 2.8 10.5l1-3.6L1 4.6h3.8z" fill="url(#emeraldGrad)" opacity="0.7"/></svg></div>
      </div>
      <div class="tree">
        <div class="tree-section"><span class="tree-chevron">&#9660;</span><svg viewBox="0 0 13 13"><path d="M1 3a1 1 0 011-1h3.5l1 1.5H11a1 1 0 011 1v6a1 1 0 01-1 1H2a1 1 0 01-1-1V3z" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/></svg><span style="font-weight:500;color:#E0E8F0">Repository</span></div>
        <div class="tree-section"><span style="margin-left:10px" class="tree-chevron">&#9654;</span><svg viewBox="0 0 13 13"><path d="M1 3a1 1 0 011-1h3.5l1 1.5H11a1 1 0 011 1v6a1 1 0 01-1 1H2a1 1 0 01-1-1V3z" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/></svg><span>My Dashboards</span></div>
        <div class="tree-section"><span style="margin-left:10px" class="tree-chevron">&#9654;</span><svg viewBox="0 0 13 13"><path d="M1 3a1 1 0 011-1h3.5l1 1.5H11a1 1 0 011 1v6a1 1 0 01-1 1H2a1 1 0 01-1-1V3z" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/></svg><span>Customer Service</span></div>
        <div class="tree-section"><span style="margin-left:10px" class="tree-chevron">&#9654;</span><svg viewBox="0 0 13 13"><path d="M1 3a1 1 0 011-1h3.5l1 1.5H11a1 1 0 011 1v6a1 1 0 01-1 1H2a1 1 0 01-1-1V3z" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/></svg><span>Dashboards</span></div>
        <div class="tree-section"><span style="margin-left:10px" class="tree-chevron">&#9654;</span><svg viewBox="0 0 13 13"><path d="M1 3a1 1 0 011-1h3.5l1 1.5H11a1 1 0 011 1v6a1 1 0 01-1 1H2a1 1 0 01-1-1V3z" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/></svg><span>Marketing</span></div>
        <div class="tree-item active">
          <svg viewBox="0 0 11 11"><rect x="0.5" y="0.5" width="4" height="4" rx="0.5" fill="url(#accentGrad)"/><rect x="6" y="0.5" width="4" height="4" rx="0.5" fill="url(#accentGrad)"/><rect x="0.5" y="6" width="4" height="4" rx="0.5" fill="url(#accentGrad)"/><rect x="6" y="6" width="4" height="4" rx="0.5" fill="url(#accentGrad)"/></svg>
          Revenue Dashboard
        </div>
        <div class="tree-item"><svg viewBox="0 0 11 11"><rect x="0.5" y="0.5" width="4" height="4" rx="0.5" fill="rgba(255,255,255,0.2)"/><rect x="6" y="0.5" width="4" height="4" rx="0.5" fill="rgba(255,255,255,0.2)"/><rect x="0.5" y="6" width="4" height="4" rx="0.5" fill="rgba(255,255,255,0.2)"/><rect x="6" y="6" width="4" height="4" rx="0.5" fill="rgba(255,255,255,0.2)"/></svg>Sales Overview</div>
        <div class="tree-item"><svg viewBox="0 0 11 11"><rect x="0.5" y="0.5" width="4" height="4" rx="0.5" fill="rgba(255,255,255,0.2)"/><rect x="6" y="0.5" width="4" height="4" rx="0.5" fill="rgba(255,255,255,0.2)"/><rect x="0.5" y="6" width="4" height="4" rx="0.5" fill="rgba(255,255,255,0.2)"/><rect x="6" y="6" width="4" height="4" rx="0.5" fill="rgba(255,255,255,0.2)"/></svg>Pipeline Analysis</div>
        <div class="tree-item"><svg viewBox="0 0 11 11"><rect x="0.5" y="0.5" width="4" height="4" rx="0.5" fill="rgba(255,255,255,0.2)"/><rect x="6" y="0.5" width="4" height="4" rx="0.5" fill="rgba(255,255,255,0.2)"/><rect x="0.5" y="6" width="4" height="4" rx="0.5" fill="rgba(255,255,255,0.2)"/><rect x="6" y="6" width="4" height="4" rx="0.5" fill="rgba(255,255,255,0.2)"/></svg>Quarterly Report</div>
        <div class="tree-item"><svg viewBox="0 0 11 11"><rect x="0.5" y="0.5" width="4" height="4" rx="0.5" fill="rgba(255,255,255,0.2)"/><rect x="6" y="0.5" width="4" height="4" rx="0.5" fill="rgba(255,255,255,0.2)"/><rect x="0.5" y="6" width="4" height="4" rx="0.5" fill="rgba(255,255,255,0.2)"/><rect x="6" y="6" width="4" height="4" rx="0.5" fill="rgba(255,255,255,0.2)"/></svg>Regional Breakdown</div>
      </div>
    </div>

    <!-- Chart grid — references the 4 chart SVGs -->
    <div class="content">
      <div class="chart-card">
        <iframe class="chart-frame" src="chart-bar.svg?theme=dark" scrolling="no" frameborder="0"
          onload="this.contentDocument.getElementById('root').classList.add('dark')"></iframe>
      </div>
      <div class="chart-card">
        <iframe class="chart-frame" src="chart-line.svg?theme=dark" scrolling="no" frameborder="0"
          onload="this.contentDocument.getElementById('root').classList.add('dark')"></iframe>
      </div>
      <div class="chart-card">
        <iframe class="chart-frame" src="chart-pie.svg?theme=dark" scrolling="no" frameborder="0"
          onload="this.contentDocument.getElementById('root').classList.add('dark')"></iframe>
      </div>
      <div class="chart-card">
        <iframe class="chart-frame" src="chart-area.svg?theme=dark" scrolling="no" frameborder="0"
          onload="this.contentDocument.getElementById('root').classList.add('dark')"></iframe>
      </div>
    </div>
  </div>
</div>
</body>
</html>
