<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<title>Dashboard Portal</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; }

  /* CSS tokens matching chart dark mode */
  :root {
    --bg:           #151825;
    --bg-surface:   #222840;
    --bg-surface-2: #252B3E;
    --border:       rgba(255,255,255,0.12);
    --border-cyan:  rgba(0,242,255,0.22);
    --text-primary: #EEF2F7;
    --text-sec:     #8A99B0;
    --text-muted:   #7A8EA8;
    --text-dim:     #3E4E62;
    --accent:       #22D3EE;
    --active-bg:    rgba(0,242,255,0.08);
    --hover-bg:     rgba(255,255,255,0.04);
  }

  .portal {
    width: 100%; height: 100vh;
    display: flex; flex-direction: column;
    background: var(--bg);
    color: var(--text-sec);
  }

  /* Top nav — flat, no shadows or glows */
  .topnav {
    display: flex; align-items: center;
    height: 44px; padding: 0 12px;
    flex-shrink: 0; gap: 4px;
    background: var(--bg-surface-2);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    margin-right: 4px; flex-shrink: 0;
  }
  .nav-logo svg { width: 20px; height: 20px; }

  .nav-btn {
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px; cursor: pointer; flex-shrink: 0;
    transition: background 0.15s;
  }
  .nav-btn:hover { background: var(--hover-bg); }
  .nav-btn svg { width: 14px; height: 14px; }

  /* Active state — flat, border only, no inset shadow or glow */
  .nav-btn.active {
    background: var(--active-bg);
    border: 0.5px solid var(--border-cyan);
  }

  .nav-spacer { flex: 1; }

  .nav-right { display: flex; align-items: center; gap: 4px; }
  .nav-right-btn {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.15s;
  }
  .nav-right-btn:hover { background: var(--hover-bg); }
  .nav-right-btn svg { width: 13px; height: 13px; }

  .nav-avatar {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--bg-surface-2);
    border: 0.5px solid var(--border-cyan);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .nav-avatar svg { width: 14px; height: 14px; fill: var(--text-sec); }

  /* Breadcrumb bar */
  .breadcrumb-bar {
    display: flex; align-items: center; gap: 6px;
    padding: 0 12px; height: 32px; flex-shrink: 0;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
  }
  .breadcrumb-label { font-size: 11px; font-weight: 500; color: var(--text-sec); }
  .breadcrumb-sep   { color: var(--text-dim); font-size: 11px; }
  .breadcrumb-spacer { flex: 1; }
  .breadcrumb-action {
    width: 22px; height: 22px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.15s;
  }
  .breadcrumb-action:hover { background: var(--hover-bg); }
  .breadcrumb-action svg { width: 12px; height: 12px; }

  /* Body */
  .body { display: flex; flex: 1; overflow: hidden; min-height: 0; }

  /* Left panel */
  .left-panel {
    width: 220px; flex-shrink: 0;
    background: var(--bg-surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }

  .panel-search-row {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
  }
  .panel-search {
    flex: 1; font-size: 11px; font-family: inherit;
    padding: 4px 8px; border-radius: 5px;
    border: 0.5px solid var(--border);
    background: rgba(255,255,255,0.05);
    color: var(--text-sec); outline: none; min-width: 0;
  }
  .panel-search::placeholder { color: var(--text-muted); }
  .panel-search:focus { border-color: var(--border-cyan); }

  .panel-icon-btn {
    width: 24px; height: 24px; border-radius: 5px;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    background: var(--bg-surface);
    border: 0.5px solid var(--border);
    cursor: pointer; transition: background 0.15s;
  }
  .panel-icon-btn:hover { background: var(--hover-bg); }
  .panel-icon-btn svg { width: 11px; height: 11px; }

  /* Tree */
  .tree { flex: 1; overflow-y: auto; padding: 4px 0; }
  .tree::-webkit-scrollbar { width: 3px; }
  .tree::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .tree-section {
    display: flex; align-items: center; gap: 5px;
    padding: 3px 10px; font-size: 11px;
    color: var(--text-muted); cursor: pointer;
    transition: background 0.12s;
  }
  .tree-section:hover { background: var(--hover-bg); color: var(--text-sec); }
  .tree-chevron { font-size: 8px; color: var(--text-dim); flex-shrink: 0; }
  .tree-section svg { width: 12px; height: 12px; flex-shrink: 0; opacity: 0.5; }

  .tree-item {
    display: flex; align-items: center; gap: 6px;
    padding: 3px 10px 3px 24px; font-size: 11px;
    color: var(--text-muted); cursor: pointer;
    transition: background 0.12s; position: relative;
  }
  .tree-item:hover { background: var(--hover-bg); color: var(--text-sec); }
  .tree-item svg { width: 10px; height: 10px; flex-shrink: 0; opacity: 0.4; }

  .tree-item.active {
    background: var(--active-bg);
    color: var(--text-primary);
    font-weight: 500;
  }
  /* Flat accent bar — no glow */
  .tree-item.active::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
    background: var(--accent);
  }
  .tree-item.active svg { opacity: 0.9; }

  /* Content grid */
  .content {
    flex: 1; overflow: hidden;
    padding: 10px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 10px;
    min-height: 0;
    background: var(--bg);
  }

  .chart-card {
    position: relative; min-height: 0; min-width: 0;
    border-radius: 18px;
  }

  .chart-frame {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    border: none; outline: none;
    background: transparent;
    border-radius: 18px;
    display: block;
  }
</style>
</head>
