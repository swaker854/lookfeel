<script type="text/javascript">
//<![CDATA[
(function() {
  var svg       = document.getElementById('root');
  var ns        = 'http://www.w3.org/2000/svg';
  var dotsLayer = document.getElementById('dots-layer');
  var tipLayer  = document.getElementById('tip-layer');

  var series = [
    { id:1, label:'Cyan',    light:'#00D4E8', dark:'#22D3EE',
      vals:[32,38,41,48,52,61,68,72], ys:[372,348,336,308,292,256,228,212] },
    { id:2, label:'Violet',  light:'#8B5CF6', dark:'#A78BFA',
      vals:[28,31,35,40,44,49,55,62], ys:[388,376,360,340,324,304,280,252] },
    { id:3, label:'Emerald', light:'#00B87A', dark:'#10B981',
      vals:[18,22,25,29,25,28,31,35], ys:[428,412,400,384,400,388,376,360] },
    { id:4, label:'Amber',   light:'#F59E0B', dark:'#FBB724',
      vals:[12,15,18,14,17,20,16,22], ys:[452,440,428,444,432,420,436,412] },
    { id:5, label:'Slate',   light:'#64748B', dark:'#94A3B8',
      vals:[10,13,11,15,13,17,15,19], ys:[460,448,456,440,448,432,440,424] },
  ];

  var quarters = ["Q1 '22","Q2 '22","Q3 '22","Q4 '22","Q1 '23","Q2 '23","Q3 '23","Q4 '23"];
  var xs = [68,180,291,403,515,627,738,850];
  var allTips = {};

  function el(tag, attrs) {
    var e = document.createElementNS(ns, tag);
    Object.keys(attrs).forEach(function(k) { e.setAttribute(k, attrs[k]); });
    return e;
  }

  function swapColors(dark) {
    series.forEach(function(s) {
      var line = document.getElementById('line-' + s.id);
      var area = document.getElementById('area-' + s.id);
      if (line) line.setAttribute('stroke', dark ? s.dark : s.light);
      if (area) area.setAttribute('fill', dark ? s.dark : s.light);
    });
  }

  series.forEach(function(s) {
    xs.forEach(function(x, qi) {
      var y     = s.ys[qi];
      var key   = s.id + '_' + qi;
      var delay = ((s.id - 1) * 0.15 + qi * 0.06) + 's';

      var dg    = el('g', { 'class':'dot-g', id:'d'+key });
      var inner = el('g', { 'class':'dot-inner',
        style:'transform-origin:'+x+'px '+y+'px; animation-delay:'+delay });
      var dot   = el('circle', { cx:x, cy:y, r:5, fill:s.dark });
      inner.appendChild(dot);
      dg.appendChild(inner);
      dotsLayer.appendChild(dg);

      var bw = Math.max(80, s.label.length * 7 + 40);
      var bh = 48;
      var hw = bw / 2, hh = bh / 2, TAIL = 14;
      var bCx = x, bCy = y - hh - TAIL - 6;
      var tailBaseY = bCy + hh;

      var tipG = el('g', { 'class':'tip', id:'t'+key });
      tipLayer.appendChild(tipG);
      allTips[key] = tipG;

      /* No filter — flat design */
      tipG.appendChild(el('rect', { x:bCx-hw, y:bCy-hh, width:bw, height:bh, rx:8, 'class':'bub-bg' }));
      tipG.appendChild(el('rect', { x:bCx-hw, y:bCy-hh, width:bw, height:bh, rx:8, 'class':'bub-bdr' }));
      tipG.appendChild(el('polygon', {
        points:(bCx+10)+','+(tailBaseY-1)+' '+(bCx-10)+','+(tailBaseY-1)+' '+bCx+','+(tailBaseY+TAIL+3),
        'class':'bub-tip-p' }));
      tipG.appendChild(el('path', {
        d:'M'+(bCx+10)+','+(tailBaseY-1)+' '+bCx+','+(tailBaseY+TAIL+3)+' '+(bCx-10)+','+(tailBaseY-1),
        'class':'bub-bdr', fill:'none', 'stroke-width':'1' }));

      var tv = el('text', { x:bCx, y:bCy-7, 'text-anchor':'middle',
        'dominant-baseline':'central', 'class':'bub-val' });
      tv.textContent = '$' + s.vals[qi] + 'M';
      tipG.appendChild(tv);
      var tl = el('text', { x:bCx, y:bCy+8, 'text-anchor':'middle',
        'dominant-baseline':'central', 'class':'bub-lbl' });
      tl.textContent = s.label + ' · ' + quarters[qi];
      tipG.appendChild(tl);

      var ch = document.getElementById('ch' + qi);
      dg.addEventListener('mouseenter', function() {
        allTips[key].style.opacity = '1';
        if (ch) ch.style.opacity = '1';
        dot.setAttribute('r', '7');
      });
      dg.addEventListener('mouseleave', function() {
        allTips[key].style.opacity = '';
        if (ch) ch.style.opacity = '';
        dot.setAttribute('r', '5');
      });
    });
  });

  function setMode(wantDark) {
    var currently = svg.classList.contains('dark');
    if (wantDark === currently) return;
    var thumb = document.getElementById('tthumb');
    var lbl   = document.getElementById('tlabel');
    if (wantDark) {
      svg.classList.add('dark');
      if (thumb) thumb.setAttribute('cx', '52');
      if (lbl)   lbl.textContent = 'Light';
    } else {
      svg.classList.remove('dark');
      if (thumb) thumb.setAttribute('cx', '16');
      if (lbl)   lbl.textContent = 'Dark';
    }
    swapColors(wantDark);
  }

  document.getElementById('dark-toggle').addEventListener('click', function() {
    setMode(!svg.classList.contains('dark'));
  });
  document.getElementById('print-toggle').addEventListener('click', function() {
    var thumb = document.getElementById('pthumb'), lbl = document.getElementById('plabel');
    if (svg.classList.toggle('print')) { thumb.setAttribute('cx','52'); lbl.textContent='Screen'; }
    else                               { thumb.setAttribute('cx','16'); lbl.textContent='Print';  }
  });

  /* theme param handled below */

  window.setMode = setMode;
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'setMode') setMode(e.data.dark);
  });

  /* ── URL param: ?theme=dark|light sets initial mode ── */
  (function() {
    var href = window.location.href;
    setMode(href.indexOf('theme=dark') !== -1);
  })();

})();
//]]>
</script>
</svg>
